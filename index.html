<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Tap Tap Send</title>

<!-- PWA / iOS install -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tap Tap Send" />
<meta name="theme-color" content="#094A35" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-192.png" />

<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --pine:#0E5C43;         /* brand green */
  --pine-deep:#094A35;
  --pine-bright:#12A06A;  /* action green */
  --pine-glow:#16B67A;
  --mint:#E8F5EF;
  --coral:#E8503A;        /* single warm accent */
  --ink:#0E1A16;
  --muted:#6B7A73;
  --line:#E7EAE7;
  --bg:#F6F8F6;
  --card:#FFFFFF;
  --danger:#D64545;
  --shadow:0 10px 30px rgba(9,74,53,.10);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.tnum{font-variant-numeric:tabular-nums;}

/* app shell = iPhone viewport */
#app{
  position:relative;height:100dvh;width:100%;max-width:480px;margin:0 auto;
  background:var(--bg);overflow:hidden;
}

/* ============================================================
   SCREENS (stacked, animated)
   ============================================================ */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;
  transform:translateX(0);transition:transform .34s cubic-bezier(.32,.72,0,1),opacity .34s;}
.screen.hide-right{transform:translateX(100%);}
.screen.hide-left{transform:translateX(-24%);opacity:.4;}
.screen.hidden{display:none;}

/* status bar spacer for the notch */
.statuspad{height:calc(var(--safe-t) + 6px);flex:0 0 auto;}

/* ============================================================
   LOCK SCREEN
   ============================================================ */
#lock{
  background:linear-gradient(165deg,#0E5C43 0%,#094A35 55%,#062A1E 100%);
  color:#fff;align-items:center;justify-content:space-between;padding-bottom:calc(24px + var(--safe-b));
}
.lock-top{display:flex;flex-direction:column;align-items:center;margin-top:14vh;}
.lock-logo{width:74px;height:74px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.35);}
.lock-title{font-size:20px;font-weight:600;margin-top:16px;letter-spacing:-.2px;}
.lock-sub{font-size:14px;color:rgba(255,255,255,.6);margin-top:4px;}
.dots{display:flex;gap:16px;margin-top:34px;}
.dot{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);transition:.15s;}
.dot.on{background:#fff;border-color:#fff;transform:scale(1.05);}
.dots.err{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.lock-hint{font-size:12.5px;color:rgba(255,255,255,.45);margin-top:16px;height:16px;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 30px;width:min(300px,80%);}
.key{aspect-ratio:1;max-width:74px;justify-self:center;width:100%;border-radius:50%;
  background:rgba(255,255,255,.08);font-size:28px;font-weight:400;color:#fff;
  display:flex;align-items:center;justify-content:center;transition:.1s;backdrop-filter:blur(4px);}
.key:active{background:rgba(255,255,255,.22);transform:scale(.94);}
.key.blank{background:none;pointer-events:none;}
.key.util{font-size:14px;font-weight:500;background:none;}
.key.face{font-size:26px;}

/* ============================================================
   TOP BAR (in-app)
   ============================================================ */
.topbar{display:flex;align-items:center;gap:12px;padding:6px 20px 10px;flex:0 0 auto;}
.topbar h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin:0;flex:1;}
.iconbtn{width:38px;height:38px;border-radius:50%;background:var(--card);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
.back{font-size:22px;color:var(--pine);}

/* scroll body */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 120px;}

/* ============================================================
   HOME
   ============================================================ */
.hero{background:linear-gradient(150deg,var(--pine) 0%,var(--pine-deep) 100%);
  border-radius:26px;padding:22px 22px 20px;color:#fff;box-shadow:0 14px 34px rgba(9,74,53,.28);position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(22,182,122,.5),transparent 70%);}
.hero .lbl{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;}
.hero .amt{font-size:40px;font-weight:800;letter-spacing:-1.2px;margin-top:6px;}
.hero .amt small{font-size:20px;font-weight:600;opacity:.8;}
.hero .row{display:flex;gap:20px;margin-top:16px;font-size:12.5px;color:rgba(255,255,255,.75);}
.hero .row b{display:block;color:#fff;font-size:15px;font-weight:700;margin-top:2px;}

.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:26px 4px 12px;}
.section-h h2{font-size:16px;font-weight:700;margin:0;letter-spacing:-.2px;}
.section-h a{font-size:13px;color:var(--pine-bright);font-weight:600;}

/* recipients rail */
.rail{display:flex;gap:14px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none;}
.rail::-webkit-scrollbar{display:none;}
.recip{flex:0 0 auto;width:66px;text-align:center;}
.ava{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#fff;margin:0 auto 6px;box-shadow:var(--shadow);}
.recip .nm{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recip.add .ava{background:var(--mint);color:var(--pine);border:1.5px dashed var(--pine-bright);}

/* txn list */
.txn{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:16px;
  padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.txn .ava{width:44px;height:44px;font-size:16px;margin:0;flex:0 0 auto;box-shadow:none;}
.txn .mid{flex:1;min-width:0;}
.txn .mid .t1{font-size:14.5px;font-weight:600;}
.txn .mid .t2{font-size:12px;color:var(--muted);margin-top:2px;}
.txn .right{text-align:right;flex:0 0 auto;}
.txn .right .v{font-size:14.5px;font-weight:700;}
.pill{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;}
.pill.ok{background:#E4F6EC;color:#137a4e;}
.pill.pend{background:#FFF3DA;color:#9a6b00;}
.pill.fail{background:#FDE6E6;color:#b62c2c;}

.month-h{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 4px 10px;}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;}

/* ---- real-app style activity/transaction rows (grey circle + check/X) ---- */
.searchbar{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);border-radius:30px;
  padding:13px 18px;margin:2px 0 8px;background:var(--card);}
.searchbar svg{width:20px;height:20px;stroke:var(--muted);flex:0 0 auto;}
.searchbar input{border:none;outline:none;flex:1;font-size:16px;font-family:inherit;background:none;color:var(--ink);-webkit-user-select:text;user-select:text;}
.searchbar input::placeholder{color:#9aa8a1;}
.arow{display:flex;align-items:center;gap:14px;padding:16px 2px;cursor:pointer;}
.arow:active{background:#fafbfa;}
.acircle{width:48px;height:48px;border-radius:50%;background:#EFF1EF;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.acircle svg{width:24px;height:24px;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
.acircle.ok svg{stroke:#3E8B63;}
.acircle.fail svg{stroke:#D64545;}
.acircle.pend svg{stroke:#C08A2E;}
.arow .amid{flex:1;min-width:0;}
.arow .anm{font-size:16px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.arow .ast{font-size:14px;color:var(--muted);margin-top:2px;}
.arow .aright{text-align:right;flex:0 0 auto;}
.arow .aval{font-size:16px;font-weight:700;color:var(--ink);}
.arow .adate{font-size:13.5px;color:var(--muted);margin-top:2px;white-space:nowrap;}
.no-results{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}

/* ---- referrals ---- */
.ref-hero{background:linear-gradient(150deg,var(--pine) 0%,var(--pine-deep) 100%);border-radius:24px;padding:26px 22px;color:#fff;text-align:center;box-shadow:0 14px 34px rgba(9,74,53,.28);}
.ref-hero .gift{font-size:40px;}
.ref-hero h2{font-size:20px;font-weight:800;margin:12px 0 6px;letter-spacing:-.3px;}
.ref-hero p{font-size:13.5px;color:rgba(255,255,255,.78);margin:0;line-height:1.5;}
.ref-code{display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(255,255,255,.14);
  border:1px dashed rgba(255,255,255,.5);border-radius:14px;padding:14px 16px;margin-top:18px;}
.ref-code .code{font-size:19px;font-weight:800;letter-spacing:2px;}
.ref-code button{background:#fff;color:var(--pine-deep);font-weight:700;font-size:13px;padding:8px 14px;border-radius:20px;}
.ref-step{display:flex;gap:14px;align-items:flex-start;padding:14px 2px;}
.ref-step .n{width:28px;height:28px;border-radius:50%;background:var(--mint);color:var(--pine);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.ref-step .rt{font-size:14.5px;font-weight:600;}
.ref-step .rt small{display:block;color:var(--muted);font-weight:400;font-size:12.5px;margin-top:2px;}

/* ---- real-style HOME ---- */
.home-top{display:flex;align-items:center;justify-content:space-between;padding:6px 0 14px;}
.promo-pill{display:flex;align-items:center;gap:6px;background:#EAF3EE;color:var(--pine);border-radius:22px;padding:8px 14px;font-size:15px;font-weight:700;}
.sb-ava{width:44px;height:44px;border-radius:50%;background:var(--pine-deep);color:var(--mint);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;}
.conv{margin-top:2px;}
.conv-row{display:flex;align-items:center;justify-content:space-between;padding:14px 2px;}
.cur-pill{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700;color:var(--ink);}
.cur-pill .fl{font-size:22px;}
.cur-pill.drop::after{content:"▾";color:var(--muted);font-size:13px;margin-left:2px;}
.conv-amt{font-size:30px;font-weight:800;color:var(--ink);letter-spacing:-.5px;}
.conv-amt.zero{color:#c2ccc7;}
.conv-line{position:relative;height:1px;background:var(--line);margin:2px 0;}
.swap{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--pine);}
.swap svg{width:18px;height:18px;}
.rate-line{font-size:13.5px;color:var(--muted);margin-top:12px;}
.promo-2{font-size:13.5px;color:var(--pine-bright);font-weight:600;margin-top:3px;}
.send-btn{margin-top:16px;padding:17px;border-radius:16px;background:var(--pine-bright);color:#fff;font-size:17px;font-weight:700;text-align:center;letter-spacing:.3px;transition:.12s;}
.send-btn:active{transform:scale(.99);background:var(--pine);}

.home-sec{display:flex;align-items:baseline;justify-content:space-between;margin:28px 2px 12px;}
.home-sec h2{font-size:19px;font-weight:800;margin:0;letter-spacing:-.3px;color:var(--ink);}
.home-sec h2.g{color:var(--pine);}
.home-sec a{font-size:14px;color:var(--pine-bright);font-weight:600;}

.wallet-cards{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.wallet-cards::-webkit-scrollbar{display:none;}
.wcard{flex:0 0 auto;min-width:150px;background:#F1F4F2;border-radius:16px;padding:16px;}
.wcard .wc-top{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--muted);}
.wcard .wc-top .fl{font-size:18px;}
.wcard .wc-amt{font-size:22px;font-weight:800;color:var(--ink);margin-top:10px;letter-spacing:-.5px;}
.wcard.addw{display:flex;align-items:center;justify-content:center;min-width:64px;color:var(--pine);font-size:26px;font-weight:400;border:1.5px dashed #c3d0c9;background:none;}

.bill-tile{display:flex;flex-direction:column;align-items:center;gap:8px;width:80px;}
.bill-tile .bic{width:64px;height:64px;border-radius:18px;background:#EAF3EE;display:flex;align-items:center;justify-content:center;font-size:26px;}
.bill-tile .bnm{font-size:12px;color:var(--ink);text-align:center;font-weight:500;line-height:1.25;}
.see-all{display:block;text-align:center;color:var(--pine-bright);font-weight:700;font-size:14px;padding:14px 0 4px;letter-spacing:.3px;}

/* ---- account / profile page (real style) ---- */
.acct-head{display:flex;flex-direction:column;align-items:center;padding:8px 0 24px;}
.acct-ava{width:110px;height:110px;border-radius:50%;background:var(--pine-deep);color:var(--mint);font-size:38px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.acct-name{font-size:26px;font-weight:800;color:var(--pine);margin-top:16px;letter-spacing:-.3px;}
.acct-phone{font-size:16px;color:var(--muted);margin-top:4px;}
.acct-row{display:flex;align-items:center;gap:16px;padding:18px 2px;width:100%;text-align:left;}
.acct-row .aic{width:48px;height:48px;border-radius:50%;background:#F1F4F2;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.acct-row .aic svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.acct-row .alab{flex:1;font-size:18px;font-weight:600;color:var(--ink);}
.acct-row .achev{color:#c4ccc7;font-size:22px;}

/* ============================================================
   BOTTOM TAB BAR
   ============================================================ */
.tabbar{position:absolute;left:0;right:0;bottom:0;height:calc(64px + var(--safe-b));
  padding-bottom:var(--safe-b);background:rgba(255,255,255,.86);backdrop-filter:blur(18px);
  border-top:1px solid var(--line);display:flex;align-items:center;z-index:40;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:600;height:64px;justify-content:center;}
.tab svg{width:24px;height:24px;}
.tab.on{color:var(--pine);}
.tab.send{position:relative;}
.fab{width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,var(--pine-glow),var(--pine));
  display:flex;align-items:center;justify-content:center;color:#fff;margin-top:-26px;
  box-shadow:0 10px 22px rgba(14,92,67,.4);}
.fab svg{width:26px;height:26px;}

/* ============================================================
   SEND FLOW
   ============================================================ */
.flow{background:var(--bg);}
.step{flex:1;overflow-y:auto;padding:0 20px 24px;display:flex;flex-direction:column;}
.progress{display:flex;gap:6px;padding:0 20px 14px;}
.progress span{flex:1;height:4px;border-radius:4px;background:var(--line);transition:.3s;}
.progress span.on{background:var(--pine-bright);}

/* amount step */
.amt-wrap{text-align:center;margin-top:8px;}
.amt-lbl{font-size:13px;color:var(--muted);font-weight:600;}
.amt-big{font-size:56px;font-weight:800;letter-spacing:-2px;margin:6px 0;color:var(--ink);}
.amt-big .cur{color:var(--muted);font-weight:700;}
.convert{background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);margin:8px auto 0;max-width:320px;}
.convert .cline{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--muted);}
.convert .cline b{color:var(--ink);font-weight:700;}
.convert .they{border-top:1px dashed var(--line);margin-top:6px;padding-top:10px;}
.convert .they .big{font-size:19px;color:var(--pine);font-weight:800;}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:auto;padding-top:16px;}
.nk{padding:16px 0;font-size:24px;font-weight:600;border-radius:14px;background:var(--card);box-shadow:var(--shadow);transition:.1s;}
.nk:active{background:var(--mint);transform:scale(.96);}

/* recipient step */
.rlist .txn{cursor:pointer;}
.rlist .txn.sel{outline:2px solid var(--pine-bright);}
.method-tag{font-size:11px;color:var(--muted);}

/* review step */
.review-card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:6px 18px;margin-top:8px;}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--line);font-size:14px;}
.rrow:last-child{border-bottom:none;}
.rrow .k{color:var(--muted);}
.rrow .v{font-weight:700;text-align:right;}
.rrow .v small{display:block;font-weight:500;color:var(--muted);font-size:11.5px;}
.total-card{background:var(--mint);border-radius:16px;padding:16px 18px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;}
.total-card .k{font-size:13px;color:var(--pine-deep);font-weight:600;}
.total-card .v{font-size:22px;font-weight:800;color:var(--pine-deep);}

/* method chips */
.chips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.chip{padding:9px 14px;border-radius:20px;background:var(--card);box-shadow:var(--shadow);font-size:13px;font-weight:600;color:var(--muted);}
.chip.on{background:var(--pine);color:#fff;}

/* tap-tap confirm step */
.tap-step{align-items:center;justify-content:center;text-align:center;}
.tap-lead{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.tap-sub{font-size:14px;color:var(--muted);margin-top:8px;max-width:260px;}
.tapbtn{position:relative;width:220px;height:220px;border-radius:50%;margin:40px auto;
  background:linear-gradient(145deg,var(--pine-glow),var(--pine));color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 18px 44px rgba(14,92,67,.45);transition:transform .12s;}
.tapbtn:active{transform:scale(.95);}
.tapbtn .big{font-size:22px;font-weight:800;}
.tapbtn .sm{font-size:12.5px;opacity:.85;}
.tapbtn.armed{animation:pulse 1s infinite;}
@keyframes pulse{0%{box-shadow:0 18px 44px rgba(14,92,67,.45),0 0 0 0 rgba(22,182,122,.5);}
  70%{box-shadow:0 18px 44px rgba(14,92,67,.45),0 0 0 26px rgba(22,182,122,0);}100%{box-shadow:0 18px 44px rgba(14,92,67,.45),0 0 0 0 rgba(22,182,122,0);}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);transform:scale(0);animation:rip .6s ease-out;pointer-events:none;}
@keyframes rip{to{transform:scale(3);opacity:0;}}
.tap-counter{font-size:13px;color:var(--pine);font-weight:700;height:18px;}

/* success */
.success{align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#F6F8F6,#EAF6EF);}
.check-wrap{width:110px;height:110px;border-radius:50%;background:var(--pine-bright);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px rgba(18,160,106,.4);animation:pop .5s cubic-bezier(.2,1.4,.4,1);}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.check-wrap svg{width:56px;height:56px;stroke:#fff;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:60;stroke-dashoffset:60;animation:draw .4s .2s forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
.success h2{font-size:24px;margin:22px 0 6px;font-weight:800;letter-spacing:-.4px;}
.success p{color:var(--muted);font-size:14px;margin:0;}
.receipt{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:6px 18px;margin:24px 0;width:100%;max-width:320px;text-align:left;}

/* ============================================================
   SETTINGS
   ============================================================ */
.set-group{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
.set-row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line);font-size:14.5px;}
.set-row:last-child{border-bottom:none;}
.set-row .ic{width:30px;height:30px;border-radius:8px;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;}
.set-row .lab{flex:1;}
.set-row .lab small{display:block;color:var(--muted);font-size:12px;font-weight:400;margin-top:1px;}
.set-row .chev{color:#c4ccc7;font-size:18px;}
.group-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 4px 8px;}

/* toggle */
.toggle{width:50px;height:30px;border-radius:30px;background:var(--line);position:relative;transition:.2s;flex:0 0 auto;}
.toggle.on{background:var(--pine-bright);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.toggle.on::after{left:23px;}

/* segmented */
.seg{display:flex;background:var(--line);border-radius:12px;padding:3px;gap:3px;}
.seg button{flex:1;padding:8px 4px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--muted);}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);}

/* primary CTA */
.cta{margin:auto 20px 0;padding:16px;border-radius:16px;background:linear-gradient(145deg,var(--pine-glow),var(--pine));
  color:#fff;font-size:16px;font-weight:700;text-align:center;box-shadow:0 10px 24px rgba(14,92,67,.35);transition:.12s;}
.cta:active{transform:scale(.98);}
.cta.disabled{background:#c9d2cd;box-shadow:none;pointer-events:none;}
.cta-wrap{padding-bottom:calc(16px + var(--safe-b));flex:0 0 auto;}

/* sheet (change PIN) */
.sheet-scrim{position:absolute;inset:0;background:rgba(6,32,24,.5);z-index:60;opacity:0;pointer-events:none;transition:.25s;}
.sheet-scrim.on{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:24px 24px 0 0;
  padding:22px 22px calc(28px + var(--safe-b));z-index:61;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-width:480px;margin:0 auto;}
.sheet.on{transform:translateY(0);}
.sheet h3{margin:0 0 4px;font-size:18px;font-weight:700;}
.sheet p{margin:0 0 18px;color:var(--muted);font-size:13.5px;}
.sheet .dots{justify-content:center;margin:20px 0 4px;}
.sheet .keypad{margin:14px auto 0;}
.sheet .key{background:var(--bg);color:var(--ink);}
.sheet .key.util{background:none;color:var(--pine);}

.toast{position:absolute;left:50%;bottom:calc(90px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:70;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

function relDate(iso){
  const d=new Date(iso+"T00:00:00"), now=new Date();
  const days=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate())-d)/86400000);
  if(days<=0) return "Today";
  if(days===1) return "a day ago";
  if(days<7)  return days+" days ago";
  return d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
}

function bindLock(){
  pinBuf="";
  const dots=$("#dots"), hint=$("#hint");
  const draw=()=>[...dots.children].forEach((d,i)=>d.classList.toggle("on",i<pinBuf.length));
  $("#keypad").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b)return; haptic();
    if(b.dataset.act==="del"){ pinBuf=pinBuf.slice(0,-1); draw(); return; }

    }
  });
}

  clearTimeout(lockTimer);

  }
});

/* ================================================================
   MAIN EVENT BINDING
   ================================================================ */
function bindMain(){
  app.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{currentTab=el.dataset.go;render();});
  app.querySelectorAll("[data-send]").forEach(el=>el.onclick=()=>startSend(el.dataset.send));
  app.querySelectorAll("[data-txn]").forEach(el=>el.onclick=()=>openReceipt(el.dataset.txn));
  app.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>{
    const k=el.dataset.toggle; CONFIG[k]=!CONFIG[k]; persist(); render(); haptic();});
  app.querySelectorAll("[data-seg] button").forEach(b=>b.onclick=()=>{
    CONFIG[b.parentElement.dataset.seg]=b.dataset.v; persist(); render(); haptic();});
  app.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>settingsAction(el.dataset.act));

  // activity search — filters rows live without losing input focus
  const s=$("#actsearch");
  if(s) s.oninput=()=>{
    const q=s.value.trim().toLowerCase();
    let shown=0;
    app.querySelectorAll("#actlist .arow").forEach(row=>{
      const hit=row.dataset.name.includes(q);
      row.style.display=hit?"":"none"; if(hit)shown++;
    });
    const nr=$("#noresults"); if(nr) nr.style.display=(shown===0)?"":"none";
  };
}

function settingsAction(a){
  if(a==="lock") return lock();
  if(a==="changepin") return openChangePin();
  if(a==="settings"){ currentTab="settings"; return render(); }
  if(a==="addmoney"){ toast("Add money — coming soon"); return; }
  if(a==="bills"){ toast("Bill pay — coming soon"); return; }
  if(a==="soon"){ toast("Coming soon"); return; }
  if(a==="copycode"){ try{navigator.clipboard&&navigator.clipboard.writeText(PROFILE.refCode);}catch(e){} toast("Code copied"); return; }
  if(a==="sharecode"){
    const txt="Join me on Tap Tap Send — use code "+PROFILE.refCode+" and we both get rewarded.";
    if(navigator.share){ navigator.share({title:"Tap Tap Send",text:txt}).catch(()=>{}); }
    else { try{navigator.clipboard&&navigator.clipboard.writeText(txt);}catch(e){} toast("Invite copied"); }
    return;
  }
  if(a==="reset"){ try{localStorage.removeItem("tts_config");localStorage.removeItem("tts_tx");}catch(e){}
    CONFIG=JSON.parse(JSON.stringify(DEFAULT_CONFIG)); location.reload(); }
}

/* ================================================================
   SEND FLOW  (state machine)
   ================================================================ */
let flow = null;
function startSend(toId){
  if(CONFIG.requirePinToSend && !flow){ /* could gate here; kept simple for proto */ }
  flow = { step:0, amount:"", to:(toId==="new"?null:toId), method:null };
  renderFlow();
}
function renderFlow(){
  const steps=[stepAmount,stepRecipient,stepReview,stepTap,stepSuccess];
  app.innerHTML = steps[flow.step]();
  bindFlow();
}
function flowTop(title){
  return `<div class="statuspad"></div>
    <div class="topbar">
      <button class="iconbtn back" data-flowback>‹</button>
      <h1 style="font-size:18px">${title}</h1></div>
    <div class="progress">${[0,1,2,3].map(i=>`<span class="${i<=flow.step?"on":""}"></span>`).join("")}</div>`;
}

/* step 0 — amount */
function stepAmount(){
  const a=flow.amount||"0";
  const val=parseFloat(a)||0;
  const they=val*RATE;
  return `<div class="screen flow" id="flow">${flowTop("Enter amount")}
    <div class="step">
      <div class="amt-wrap">
        <div class="amt-lbl">You send</div>
        <div class="amt-big tnum"><span class="cur">€</span>${a}</div>
        <div class="convert">
          <div class="cline">Exchange rate <b>1 € = ${RATE} ৳</b></div>
          <div class="cline">Fee <b>${eur(FEE)}</b></div>
          <div class="cline they"><span>They receive</span><span class="big tnum">${bdt(they)}</span></div>
        </div>
      </div>
      <div class="numpad" id="numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="nk" data-k="${n}">${n}</button>`).join("")}
        <button class="nk" data-k=".">.</button>
        <button class="nk" data-k="0">0</button>
        <button class="nk" data-k="del">⌫</button>
      </div>
    </div>
    <div class="cta-wrap"><div class="cta ${val>0?"":"disabled"}" data-next>Continue</div></div>
  </div>`;
}

/* step 1 — recipient */
function stepRecipient(){
  return `<div class="screen flow" id="flow">${flowTop("Who's it for?")}
    <div class="step rlist">
      ${RECIPIENTS.map(r=>`
        <div class="txn ${flow.to===r.id?"sel":""}" data-pick="${r.id}">
          <div class="ava" style="background:${avColor(r.id)}">${initials(r.name)}</div>
          <div class="mid"><div class="t1">${r.name}</div>
            <div class="t2">${r.city} · ${METHOD_ICON[r.method]} ${r.method} ${r.acct}</div></div>
          <div class="right"><div style="font-size:20px;color:${flow.to===r.id?"var(--pine-bright)":"#d3dad6"}">${flow.to===r.id?"✓":"›"}</div></div>
        </div>`).join("")}
    </div>
    <div class="cta-wrap"><div class="cta ${flow.to?"":"disabled"}" data-next>Continue</div></div>
  </div>`;
}

/* step 2 — review */
function stepReview(){
  const r=recip(flow.to);
  const val=parseFloat(flow.amount)||0;
  const they=val*RATE;
  const total=val+FEE;
  const methods=["bKash","Nagad","Bank","Cash pickup"];
  if(!flow.method) flow.method=r.method;
  return `<div class="screen flow" id="flow">${flowTop("Review")}
    <div class="step">
      <div class="review-card">
        <div class="rrow"><span class="k">To</span><span class="v">${r.name}<small>${r.city}</small></span></div>
        <div class="rrow"><span class="k">You send</span><span class="v tnum">${eur(val)}</span></div>
        <div class="rrow"><span class="k">Fee</span><span class="v tnum">${eur(FEE)}</span></div>
        <div class="rrow"><span class="k">Rate</span><span class="v tnum">1 € = ${RATE} ৳</span></div>
        <div class="rrow"><span class="k">They receive</span><span class="v tnum" style="color:var(--pine)">${bdt(they)}</span></div>
      </div>
      <div style="margin:18px 4px 0;font-size:13px;font-weight:700;color:var(--muted)">Delivery method</div>
      <div class="chips" data-methods>
        ${methods.map(m=>`<button class="chip ${flow.method===m?"on":""}" data-m="${m}">${METHOD_ICON[m]} ${m}</button>`).join("")}
      </div>
      <div class="total-card"><span class="k">Total to pay</span><span class="v tnum">${eur(total)}</span></div>
    </div>
    <div class="cta-wrap"><div class="cta" data-next>Confirm details</div></div>
  </div>`;
}

/* step 3 — the signature TAP TAP */
let tapCount=0, tapTimer=null;
function stepTap(){
  const r=recip(flow.to), val=parseFloat(flow.amount)||0;
  return `<div class="screen flow" id="flow">${flowTop("Send")}
    <div class="step tap-step">
      <div class="tap-lead">Tap tap to send</div>
      <div class="tap-sub">Double-tap the button to send <b>${eur(val)}</b> to ${r.name}.</div>
      <button class="tapbtn armed" id="tapbtn">
        <span class="big tnum">${eur(val)}</span>
        <span class="sm">tap · tap</span>
      </button>
      <div class="tap-counter" id="tapc">Waiting for first tap…</div>
    </div>
  </div>`;
}

/* step 4 — success */
function stepSuccess(){
  const r=recip(flow.to), val=parseFloat(flow.amount)||0, they=val*RATE;
  return `<div class="screen success" id="flow">
    <div class="statuspad"></div>
    <div class="step success">
      <div class="check-wrap"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
      <h2>Money on its way</h2>
      <p>${bdt(they)} to ${r.name}</p>
      <div class="receipt">
        <div class="rrow"><span class="k">Amount</span><span class="v tnum">${eur(val)}</span></div>
        <div class="rrow"><span class="k">They receive</span><span class="v tnum">${bdt(they)}</span></div>
        <div class="rrow"><span class="k">Method</span><span class="v">${METHOD_ICON[flow.method]} ${flow.method}</span></div>
        <div class="rrow"><span class="k">Reference</span><span class="v tnum">#${Math.random().toString(36).slice(2,8).toUpperCase()}</span></div>
      </div>
      <div class="cta" style="width:100%;max-width:320px" data-done>Done</div>
    </div>
  </div>`;
}

function bindFlow(){
  const back=$("[data-flowback]"); if(back) back.onclick=()=>{ if(flow.step===0){flow=null;render();}else{flow.step--;renderFlow();} };
  const next=$("[data-next]"); if(next) next.onclick=()=>advance();
  const done=$("[data-done]"); if(done) done.onclick=()=>{ flow=null; currentTab="home"; render(); };

  // amount numpad
  const np=$("#numpad");
  if(np) np.onclick=e=>{ const b=e.target.closest("button"); if(!b)return; haptic();
    const k=b.dataset.k; let a=flow.amount;
    if(k==="del") a=a.slice(0,-1);
    else if(k==="."){ if(!a.includes(".")) a=(a||"0")+"."; }
    else { if(a==="0")a=""; if((a.split(".")[1]||"").length>=2)return; if(a.replace(".","").length>=6)return; a+=k; }
    flow.amount=a; renderFlow(); };

  // recipient pick
  app.querySelectorAll("[data-pick]").forEach(el=>el.onclick=()=>{flow.to=el.dataset.pick;flow.method=null;renderFlow();haptic();});
  // method chips
  app.querySelectorAll("[data-m]").forEach(el=>el.onclick=()=>{flow.method=el.dataset.m;renderFlow();haptic();});

  // TAP TAP handler
  const tb=$("#tapbtn");
  if(tb){ tapCount=0;
    tb.onclick=(e)=>{
      haptic(15);
      // ripple
      const rp=document.createElement("span"); rp.className="ripple";
      const rect=tb.getBoundingClientRect(); const size=Math.max(rect.width,rect.height);
      rp.style.width=rp.style.height=size+"px";
      rp.style.left=(e.clientX-rect.left-size/2)+"px"; rp.style.top=(e.clientY-rect.top-size/2)+"px";
      tb.appendChild(rp); setTimeout(()=>rp.remove(),600);

      tapCount++;
      const c=$("#tapc");
      if(tapCount===1){ c.textContent="Tap once more to confirm"; tb.classList.remove("armed");
        clearTimeout(tapTimer); tapTimer=setTimeout(()=>{ tapCount=0; c.textContent="Waiting for first tap…"; tb.classList.add("armed"); },900);
      } else if(tapCount>=2){ clearTimeout(tapTimer); haptic([20,40,60]); commitSend(); }
    };
  }
}

function advance(){
  if(flow.step===0){ if((parseFloat(flow.amount)||0)<=0) return; flow.step=1; }
  else if(flow.step===1){ if(!flow.to) return; flow.step=2; }
  else if(flow.step===2){ flow.step=3; }
  renderFlow();
}

function commitSend(){
  const val=parseFloat(flow.amount)||0;
  const tx={ id:"t"+Date.now(), to:flow.to, amountEUR:val, method:flow.method, date:new Date().toISOString().slice(0,10), status:"ok" };
  TRANSACTIONS.unshift(tx);
  recomputeTotals();
  persist();
  flow.step=4; renderFlow();
}

/* ================================================================
   RECEIPT (tap a history item)
   ================================================================ */
function openReceipt(id){
  const t=TRANSACTIONS.find(x=>x.id===id); if(!t)return;
  const r=recip(t.to), they=t.amountEUR*RATE, s=STATUS[t.status];
  const scrim=document.createElement("div"); scrim.className="sheet-scrim";
  scrim.innerHTML=`<div class="sheet" onclick="event.stopPropagation()">
    <div style="text-align:center;margin-bottom:6px">
      <div class="ava" style="width:56px;height:56px;margin:0 auto 10px;background:${avColor(t.to)}">${initials(r.name)}</div>
      <div style="font-weight:800;font-size:18px">${eur(t.amountEUR)}</div>
      <span class="pill ${s.c}">${s.t}</span>
    </div>
    <div class="review-card" style="box-shadow:none;background:var(--bg);margin-top:14px">
      <div class="rrow"><span class="k">To</span><span class="v">${r.name}<small>${r.city}</small></span></div>
      <div class="rrow"><span class="k">They receive</span><span class="v tnum">${bdt(they)}</span></div>
      <div class="rrow"><span class="k">Method</span><span class="v">${METHOD_ICON[t.method]} ${t.method}</span></div>
      <div class="rrow"><span class="k">Date</span><span class="v">${fmtDate(t.date)}</span></div>
      <div class="rrow"><span class="k">Reference</span><span class="v tnum">#${t.id.slice(-6).toUpperCase()}</span></div>
    </div>
    <div class="cta" style="margin-top:16px" onclick="this.closest('.sheet-scrim').remove()">Close</div>
  </div>`;
  scrim.onclick=()=>scrim.remove();
  app.appendChild(scrim); requestAnimationFrame(()=>{scrim.classList.add("on");scrim.querySelector(".sheet").classList.add("on");});
}

/* ================================================================
   CHANGE PIN sheet
   ================================================================ */
function openChangePin(){
  let phase="new", buf="", first="";
  const scrim=document.createElement("div"); scrim.className="sheet-scrim";
  scrim.innerHTML=`<div class="sheet" onclick="event.stopPropagation()">
    <h3 id="cp-t">Set a new passcode</h3><p id="cp-p">Choose 4 digits</p>
    <div class="dots" id="cp-dots">${[0,1,2,3].map(()=>`<div class="dot"></div>`).join("")}</div>
    <div class="keypad" id="cp-pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-n="${n}">${n}</button>`).join("")}
      <button class="key blank"></button><button class="key" data-n="0">0</button>
      <button class="key util" data-act="del">Delete</button>
    </div></div>`;
  scrim.onclick=()=>scrim.remove();
  app.appendChild(scrim);
  const dots=scrim.querySelector("#cp-dots");
  const draw=()=>[...dots.children].forEach((d,i)=>d.classList.toggle("on",i<buf.length));
  scrim.querySelector("#cp-pad").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b||b.classList.contains("blank"))return; haptic();
    if(b.dataset.act==="del"){buf=buf.slice(0,-1);draw();return;}
    if(buf.length>=4)return; buf+=b.dataset.n; draw();
    if(buf.length===4){ setTimeout(()=>{
      if(phase==="new"){ first=buf; buf=""; phase="confirm";
        scrim.querySelector("#cp-t").textContent="Confirm passcode";
        scrim.querySelector("#cp-p").textContent="Enter the same 4 digits again"; draw();
      } else {
        if(buf===first){ CONFIG.pin=first; persist(); scrim.remove(); toast("Passcode updated"); }
        else{ dots.classList.add("err"); haptic(200);
          setTimeout(()=>{buf="";first="";phase="new";dots.classList.remove("err");
            scrim.querySelector("#cp-t").textContent="Set a new passcode";
            scrim.querySelector("#cp-p").textContent="Didn't match — try again"; draw();},600); }
      }
    },120); }
  });
  requestAnimationFrame(()=>{scrim.classList.add("on");scrim.querySelector(".sheet").classList.add("on");});
}

/* misc svg */
function faceSvg(){return `<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round"><path d="M4 8V5.5A1.5 1.5 0 0 1 5.5 4H8M16 4h2.5A1.5 1.5 0 0 1 20 5.5V8M20 16v2.5a1.5 1.5 0 0 1-1.5 1.5H16M8 20H5.5A1.5 1.5 0 0 1 4 18.5V16M9 10v1M15 10v1M12 9v3l-1 1M9 15c1.5 1.2 4.5 1.2 6 0"/></svg>`;}

/* boot */
render();
</script>
